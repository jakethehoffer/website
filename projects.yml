- key: trades-agency
  name: trades-agency
  status: shipped
  url: https://github.com/jakethehoffer/trades-agency
  meta_key: null
  auto_meta: false
  hardcoded_date: "abandoned &middot; 2026"
  what: "AI receptionist + lead-gen service targeting Toronto trades &mdash; built the full stack, ran a real customer-discovery experiment, abandoned the venture on the data."
  body: "Three Python subsystems: lead-gen via Google Places API, an LLM-driven SDR generating cold outreach, and a conversational receptionist agent (&ldquo;Riley&rdquo;) with booking and message-taking logic. Ran a 32-contact cold-outreach experiment over four days (18 SMS, 14 email) and got 0 positive replies. Wrote a Bayesian post-mortem ranking six hypotheses; the leading explanation was ICP/channel mismatch &mdash; small Toronto trades simply don&rsquo;t engage with cold outreach from strangers. Abandoned the venture rather than burning more credibility and time on a non-responsive niche."
  metrics: "32 contacts &middot; 0 positive replies &middot; 6 hypotheses ranked"
  chips: "python &middot; google places api &middot; llm &middot; sdr &middot; receptionist agent"
  sample:
    label: "Excerpt from post-mortem hypothesis ranking"
    html: |-
      <span class="sample__dim">// cold outreach batch 1 — 32 contacts, 0 positive replies</span>
      <span class="sample__dim">[H1]</span> wrong icp for cold inbound      <span class="sample__hi">strong</span> (0/32 across 2 channels)
      <span class="sample__dim">[H2]</span> send time wrong (sat 2pm)      <span class="sample__dim">weak</span>   (wouldn&rsquo;t explain 0%)
      <span class="sample__dim">[H6]</span> wrong offer (missed-call pmf)  <span class="sample__hi">strong</span> (never validated demand)
      <span class="sample__dim">// recommendation: warm-intro experiment before more cold outreach</span>
  media: null
  cta: null
  resume:
    role: "trades-agency (Python · Google Places API · LLM SDR · async)"
    bullets:
      - "Toronto AI-receptionist + lead-gen venture (3 Python subsystems). 32-contact cold-outreach experiment returned 0 positive replies; wrote a 6-hypothesis post-mortem and abandoned the venture on the data rather than iterating on a non-responsive ICP."

- key: equity-arbs
  name: equity-arbs
  status: shipped
  url: https://github.com/jakethehoffer/equity-arbs
  meta_key: null
  auto_meta: false
  hardcoded_date: "v1.0 &middot; 2026"
  what: "Async Python stat-arb research toolkit for TSX-listed equities and ETFs &mdash; documented a hard ceiling and retired at v1.0."
  body: "Engle-Granger cointegration + OLS hedge ratio + Ornstein-Uhlenbeck half-life scoring across an 80-name TSX universe; rolling-window regime-stability sweep; configurable backtest engine with z-score entry/exit, hold-time cap, and stop-loss buffer. Six analysis arcs, 76 unit tests. Decision-grade backtest proved the strategy works mathematically (+$216 net across 6 ETF pairs at zero commissions) but caps at ~0.6% annual return on $5K capital &mdash; below the passive TSX index alternative. Shipped a correct negative; retired the project at v1.0 with the toolkit as a reusable research asset."
  metrics: "76 tests &middot; 80 equities + 39 etfs &middot; 6 analysis arcs"
  chips: "python &middot; asyncio &middot; sqlalchemy 2 &middot; statsmodels &middot; pydantic &middot; typer"
  sample:
    label: "Example backtest verdict"
    html: |-
      <span class="sample__dim">// example backtest result — etf pairs, 7 years</span>
      <span class="sample__dim">[XIU/XIC]</span> coint p=0.001  half-life 22d  &rarr; <span class="sample__ok">+$84</span> (entries 14, hits 9)
      <span class="sample__dim">[XEG/XIT]</span> coint p=0.024  half-life 18d  &rarr; <span class="sample__hi">-$31</span> (entries 8, hits 3)
      <span class="sample__dim">// net 6 pairs over 7y: +$216 (zero fees) &rarr; ~$30/yr at retail capital → below tsx index</span>
  media: null
  cta: null
  resume:
    role: "equity-arbs (Python · asyncio · SQLAlchemy 2 · statsmodels · pydantic)"
    bullets:
      - "Stat-arb research toolkit for TSX pair trading (spec-first, TDD, 76 unit tests). Decision-grade backtest demonstrated a ~0.6%/yr ceiling on retail capital; retired at v1.0 with the toolkit as a reusable research asset and a documented negative result."

