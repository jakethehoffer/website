# projects.yml — single source of truth for projects featured on the website + resume.
#
# Add a new project by appending an entry below. Then run:
#   python scripts/build-site.py
# which calls generate-cards.py + refresh-resume.py + refresh-meta.py in order.
# Regenerate the PDF separately via the documented LibreOffice command.
#
# Schema (each entry):
#   key             short id; matches data-meta="<key>.last_commit" on the page
#   name            displayed name in the <h3>
#   status          active | shipped | archived
#   url             external link for the <h3> (null = name renders without <a>)
#   meta_key        data-meta sentinel key (usually "<key>.last_commit")
#   auto_meta       true → refresh-meta.py auto-updates the last-commit timestamp
#   hardcoded_date  string used when auto_meta is false (e.g. "mar 2024", "2024")
#   what            1-2 sentence project lede (HTML allowed)
#   body            longer description, 80-120 words (HTML allowed)
#   metrics         terse stats line (HTML entities pre-encoded)
#   chips           tech-stack chips line
#   sample          optional code-block: {label, html} where html uses sample__dim/ok/hi spans
#   media           optional image: {src, alt, width, height}
#   cta             optional button: {label, url}
#   resume          optional resume entry: {role, bullets: [...]}; omit to skip resume

