# resume-static.yml — tracked source for the resume's STATIC sections
# (contact header, summary, education, experience).
#
# PERSONAL PROJECTS and the Writing line are NOT here — they are
# generated from projects.yml (resume_priority + cap). The builder,
# scripts/build-resume.py, combines this file + projects.yml into
# resume-source.docx, then LibreOffice converts it to resume.pdf.
#
# This file + projects.yml are the full, tracked, diffable source of the
# resume. The docx is now a derived/ephemeral artifact (gitignored).

contact:
  name: "Jake Hoffman"
  # Items rendered left-to-right, tab-separated, across the page width.
  # type: text | link
  line:
    - { type: text, text: "Toronto, ON" }
    - { type: link, text: "14jakehoffman@gmail.com", url: "mailto:14jakehoffman@gmail.com" }
    - { type: text, text: "Tel: 647-823-4504" }
    - { type: link, text: "LinkedIn", url: "https://www.linkedin.com/in/jake-hoffman-7117692a5/" }
    - { type: link, text: "jakethehoffer.github.io/website", url: "https://jakethehoffer.github.io/website/" }

# Each section: a centered bold heading + an ordered list of blocks.
# Block types:
#   role    bold line with an optional right-aligned date
#   org     italic line (company / project subtitle)
#   bullets list of '●' bullet items
sections:
  - heading: "SUMMARY OF QUALIFICATIONS"
    blocks:
      - type: bullets
        items:
          - "Computer Engineering student with a strong foundation in software engineering principles, technical problem solving, and design analysis."
          - "Proficient in Python, Java, C, C#, C++, SQL, Git, Word, Excel, JavaScript, Dart, Unity, FastAPI, Playwright, Monday.com, and Google Apps Script."
          - "Writes clean and maintainable code with attention to testing, logging, and performance."

  - heading: "EDUCATION"
    blocks:
      - { type: role, text: "3rd Year at Queen’s University", date: "September 2023 – Present" }
      - { type: org, text: "Computer Engineering" }
      - type: bullets
        items:
          - "Cumulative GPA of 3.85 with distinction of Dean’s Scholar."
          - "Developed a pathfinding algorithm in Python for autonomous operation of a rover."

  - heading: "EXPERIENCE"
    blocks:
      - { type: role, text: "Independent Software Engineer – Trading & Automation Systems", date: "May 2026 – Present" }
      - { type: org, text: "Self-directed, full-time" }
      - type: bullets
        items:
          - "Operate two 24/7 production systems: trader, an S&P 500 paper-trading agent (750+ commits since April 2026), and a ten-bookmaker arbitrage daemon in production since November 2025 (3,900+ commits)."
          - "Took market-bot (crypto market-making feasibility study) from first commit to shipped verdict in three weeks: 7 days of 24/7 venue telemetry, 9-criterion pre-trade synthesizer, data-backed NOT_READY verdict across all 75 pairs."
      - { type: role, text: "IT Intern", date: "Jun 2024 – Aug 2024; Jun 2025 – Aug 2025" }
      - { type: org, text: "Lynx Equity Limited" }
      - type: bullets
        items:
          - "Developed a task management system on Monday.com, streamlining communication between subsidiary companies and internal departments by automating issue routing to the appropriate workflow queue."
