      - { type: role, text: "Design Team Member", date: "October 2023 – March 2024" }
      - { type: org, text: "QMIND – Queen’s AI Hub" }
      - type: bullets
        items:
          - "Worked on a team project to train an agent to play Blackjack using reinforcement learning."
