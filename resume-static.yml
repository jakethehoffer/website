          - "Wrote Google Apps Script (JavaScript) that consolidates multiple Excel exports into one Google Sheet, applies pricing logic, and tracks unmatched keys for reconciliation, with a custom Sheets menu and dynamic file-ID handling."
      - { type: role, text: "Game Developer (Independent)", date: "January 2024 – March 2024" }
      - { type: org, text: "Mega Tic-Tac-Toe" }
      - type: bullets
        items:
          - "Designed and programmed a Unity game built on a 3×3 grid of linked Tic-Tac-Toe boards where each move determines the opponent’s next board, and winning a board claims one square on the grid."
