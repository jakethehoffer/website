name: public-safety

# Defensive checks that prevent privacy/leakage regressions in this
# public repo. Runs on every push to main and every PR. Fast (<10s).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  banned-terms:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # The banned terms live in the BANNED_TERMS repo secret (one term
      # per line), NOT in this file. Keeping them out of the tracked
      # tree matters: this workflow is public, and any literal (or
      # trivially-reassembled) term here IS the leak it exists to
      # prevent. GitHub masks each line of a multiline secret in logs,
      # so even matched-line output below can't reprint a term.
      - name: Reject banned terms in tracked files
        env:
          BANNED_TERMS: ${{ secrets.BANNED_TERMS }}
        run: |
          set -e
          if [ -z "$BANNED_TERMS" ]; then
            echo "::error::BANNED_TERMS secret is missing or empty — the banned-terms check cannot run. Restore it (one term per line) at Settings > Secrets and variables > Actions."
            exit 1
          fi

          fail=0
          n=0
          while IFS= read -r term; do
            [ -z "$term" ] && continue
            n=$((n + 1))
            hits=$(git grep -in -F "$term" || true)
            if [ -n "$hits" ]; then
              echo "::error::banned-term hit (term #$n):"
              echo "$hits"
              fail=1
            fi
          done <<< "$BANNED_TERMS"

          if [ "$n" -eq 0 ]; then
            echo "::error::BANNED_TERMS secret parsed to zero terms — check its formatting (one term per line)."
            exit 1
          fi

          # Wrap-proof pass: git grep matches line by line, so a term
          # split across a line break slips through — exactly how one
          # phrase survived in history until the July 2026 rewrite.
          # Concatenate all tracked files, fold every whitespace run to
          # a single space, and re-scan.
          norm=$(git ls-files -z | xargs -0 cat 2>/dev/null | tr -s '[:space:]' ' ')
          i=0
          while IFS= read -r term; do
            [ -z "$term" ] && continue
            i=$((i + 1))
            if printf '%s' "$norm" | grep -qiF "$term"; then
              echo "::error::banned-term hit in whitespace-normalized scan (term #$i — likely line-wrapped; search tracked files for its words individually)"
              fail=1
            fi
          done <<< "$BANNED_TERMS"

          if [ "$fail" -eq 1 ]; then
            echo "::error::public-safety failed — banned terms found in tracked files"
            exit 1
          fi
          echo "banned-terms: clean ($n terms, line + normalized scans)"

      - name: Verify 404.html subpath paths
        run: |
          set -e
          # In 404.html, any href="/foo or src="/foo that doesn't start
          # with "/website/" is a subpath bug (root-relative paths
          # resolve to user-root on Pages, not the project subpath).
          bad=$(grep -E '(href|src)="/[^w]' 404.html || true)
          # Also catch href="/" exactly (would route to user-root home)
          bad2=$(grep -E '(href|src)="/"' 404.html || true)
          if [ -n "$bad" ] || [ -n "$bad2" ]; then
            echo "::error::404.html has root-relative paths that break on subpath:"
            echo "$bad"
            echo "$bad2"
            exit 1
          fi
          echo "404.html paths: clean"

      - name: Verify resume-source.docx is not tracked
        run: |
          set -e
          if git ls-files | grep -q '^resume-source\.docx$'; then
            echo "::error::resume-source.docx is tracked — must be local-only (Office metadata leak)"
            exit 1
          fi
          echo "resume-source.docx: not tracked (correct)"
