name: refresh-meta

on:
  schedule:
    # Monday 12:00 UTC weekly.
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run refresh-meta.mjs
        env:
          # Prefer META_REFRESH_TOKEN (a fine-grained PAT with read
          # access to the private source repos: trader, arbitrage).
          # Falls back to the default GITHUB_TOKEN, which can only read
          # the current repo — the script will then log [skip] for
          # everything and no-op. See README for setup.
          GH_TOKEN: ${{ secrets.META_REFRESH_TOKEN || github.token }}
        run: node scripts/refresh-meta.mjs

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain index.html)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "chore: refresh project last-commit metadata [auto]"
            git push
          else
            echo "No metadata changes; nothing to commit."
          fi
