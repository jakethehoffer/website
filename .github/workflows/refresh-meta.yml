name: refresh-meta

on:
  schedule:
    # Daily at 11:23 UTC. Daily (not weekly) because the pills carry
    # day-granularity text ("last commit: today") — refreshed weekly,
    # that claim is wrong up to six days out of seven. The run is ~2
    # minutes and only commits when a pill actually changed.
    - cron: "23 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install pyyaml pypdf playwright
          playwright install --with-deps chromium

      - name: Run refresh-meta.py
        env:
          # Prefer META_REFRESH_TOKEN (a fine-grained PAT with read
          # access on All repositories, Metadata: Read). Falls back to
          # the default GITHUB_TOKEN, which can only read the current
          # repo — private-repo lookups then fail and the script EXITS
          # NON-ZERO in CI, so an expired or missing PAT shows up as a
          # red run instead of silently freezing the freshness pills.
          GH_TOKEN: ${{ secrets.META_REFRESH_TOKEN || github.token }}
        run: python scripts/refresh-meta.py

      # Pushes made below with GITHUB_TOKEN do NOT trigger other
      # workflows (GitHub's recursion guard), so verify-site.yml never
      # runs on the auto-commits. Verify the mutated tree HERE, before
      # it can ship: a refresh-meta bug must fail this run, not deploy
      # a broken index.html straight to Pages.
      - name: Verify site before committing
        run: python scripts/verify-site.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain index.html sitemap.xml)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html sitemap.xml
            git commit -m "chore: refresh project last-commit metadata [auto]"
            git push
          else
            echo "No metadata changes; nothing to commit."
          fi
