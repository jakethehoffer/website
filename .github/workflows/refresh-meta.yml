name: refresh-meta

on:
  schedule:
    # Monday 12:00 UTC weekly.
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: DIAG — token source
        env:
          GH_TOKEN: ${{ secrets.META_REFRESH_TOKEN || github.token }}
        run: |
          echo "secret META_REFRESH_TOKEN set? $([ -n "${{ secrets.META_REFRESH_TOKEN }}" ] && echo yes || echo no)"
          echo "GH_TOKEN length: ${#GH_TOKEN}"
          echo "GH_TOKEN prefix (first 8): ${GH_TOKEN:0:8}"
          echo "--- gh auth status ---"
          gh auth status 2>&1 || true
          echo "--- gh api /user ---"
          gh api /user --jq '{login,id,type}' 2>&1 || true
          echo "--- gh api repos/jakethehoffer/trader (full stderr) ---"
          gh api repos/jakethehoffer/trader 2>&1 | head -20 || true

      - name: Run refresh-meta.mjs
        env:
          GH_TOKEN: ${{ secrets.META_REFRESH_TOKEN || github.token }}
        run: node scripts/refresh-meta.mjs

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain index.html)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "chore: refresh project last-commit metadata [auto]"
            git push
          else
            echo "No metadata changes; nothing to commit."
          fi
